name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Variables mínimas para que el build no falle en CI
          # Los valores reales van en Vercel, no aquí
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost/ci' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-only-secret-not-used-in-production' }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL || 'ci@example.com' }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH || '$2b$12$placeholder.hash.for.ci.only' }}
