name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Configura estos secrets en GitHub → Settings → Secrets and variables → Actions
          # Si no están configurados, el build usa valores de CI que fallan rápido y de forma segura.
          # Las páginas con DB usan try/catch y renderizan sin datos en ese caso.
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@db.invalid:5432/ci' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-only-not-used-in-production-32chars!!' }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL || 'ci@example.com' }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH || '$2b$12$aaaaaaaaaaaaaaaaaaaaaa.aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN || '' }}
